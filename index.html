<!DOCTYPE html>
<html>
<head>
<title>Delhi Police Typing Test</title>

<style>
body{
    font-family: Arial;
    text-align:center;
}

#timer{
    position:fixed;
    right:20px;
    top:20px;
    font-size:20px;
    font-weight:bold;
}

#text{
    border:1px solid black;
    padding:20px;
    height:320px;
    width:85%;
    margin:60px auto 10px;
    overflow-y:auto;
    text-align:left;
    font-size:18px;
    line-height:30px;
}

textarea{
    width:85%;
    height:150px;
    font-size:18px;
}

select,button{
    padding:10px;
    margin:10px;
}
</style>
</head>

<body>

<h2>Delhi Police Typing Test</h2>

<p id="timer">Time Left: 10:00</p>

<select id="testSelect"></select>

<div id="text">Select Test & Start</div>

<textarea id="input"></textarea>

<br>
<button onclick="startTest()">Start</button>
<button onclick="endTest()">Submit</button>

<h3 id="result"></h3>

<script>

// 🔥 REAL DIFFERENT PASSAGES
let tests = [

`Environment protection is one of the most important responsibilities... (यहाँ पूरा 400+ words environment passage डालो)`,

`Air pollution is increasing rapidly due to industrial growth... (400+ words pollution passage)`,

`Technology has transformed communication and governance...`,

`The Indian economy is growing but faces many challenges...`,

`Education plays a key role in shaping the future...`,

`Police administration ensures safety and law enforcement...`,

`Health awareness has increased after global pandemics...`,

`Digital services have made life easier for citizens...`,

`Transport systems are expanding rapidly in cities...`,

`Discipline and hard work lead to success...`

];

// dropdown
let select = document.getElementById("testSelect");
tests.forEach((_,i)=>{
    let opt = document.createElement("option");
    opt.value = i;
    opt.text = "Test " + (i+1);
    select.appendChild(opt);
});

let time = 600;
let timer;
let currentText = "";

// START
function startTest(){

    let index = document.getElementById("testSelect").value;

    currentText = tests[index];

    document.getElementById("text").innerText = currentText;
    document.getElementById("input").value = "";

    time = 600;

    clearInterval(timer);

    timer = setInterval(()=>{
        time--;

        let m = Math.floor(time/60);
        let s = time%60;

        document.getElementById("timer").innerText =
        "Time Left: "+m+":"+(s<10?"0"+s:s);

        if(time<=0){
            clearInterval(timer);
            endTest();
        }

    },1000);
}

// ✅ CORRECT MISTAKE (Delhi Police style)
function endTest(){

    clearInterval(timer);

    let original = currentText.trim().split(/\s+/);
    let typed = document.getElementById("input").value.trim().split(/\s+/);

    let correct = 0;
    let mistakes = 0;

    for(let i=0;i<typed.length;i++){
        if(typed[i] === original[i]){
            correct++;
        }else{
            mistakes++;
        }
    }

    let attempted = typed.length;

    let minutes = (600-time)/60;

    let gross = attempted / minutes;

    let net = gross - mistakes;
    if(net < 0) net = 0;

    let accuracy = (correct/attempted)*100 || 0;

    document.getElementById("result").innerHTML = `
    Attempted Words: ${attempted} <br>
    Gross Speed: ${gross.toFixed(2)} WPM <br>
    Net Speed: ${net.toFixed(2)} WPM <br>
    Accuracy: ${accuracy.toFixed(2)}% <br>
    Mistakes: ${mistakes} <br>
    Result: ${net >= 30 ? "Qualified" : "Not Qualified"}
    `;
}

</script>

</body>
</html>
