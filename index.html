<!DOCTYPE html>
<html>
<head>
<title>Typing Test Pro</title>

<style>
body{
    font-family: Arial;
    text-align:center;
}

#timer{
    position:fixed;
    right:20px;
    top:20px;
    font-size:20px;
    font-weight:bold;
}

#text{
    border:1px solid black;
    padding:20px;
    height:300px;
    width:85%;
    margin:60px auto 10px;
    overflow-y:auto;
    text-align:left;
    font-size:18px;
    line-height:30px;
}

textarea{
    width:85%;
    height:150px;
    font-size:18px;
}

select,button{
    padding:10px;
    margin:10px;
}
</style>
</head>

<body>

<h2>Delhi Police Typing Test Series</h2>

<p id="timer">Time Left: 10:00</p>

<select id="testSelect"></select>

<div id="text">Select Test & Click Start</div>

<textarea id="input" placeholder="Start typing here..."></textarea>

<br>
<button onclick="startTest()">Start</button>
<button onclick="endTest()">Submit</button>

<h3 id="result"></h3>

<script>

// 🔥 LONG PASSAGE GENERATOR (~400+ words)
function generatePassage(num){
return "Passage "+num+": " +
"India is one of the fastest growing economies in the world and is continuously developing in multiple sectors including technology, infrastructure, and governance. " +
"The role of digital systems has increased significantly in recent years, making administrative processes faster and more transparent. " +
"Citizens are now more aware of their rights and duties, which helps in building a responsible society. " +
"Government initiatives have improved access to education, healthcare, and public services across urban and rural areas. " +
"Typing skills play an important role in government jobs, especially in clerical and ministerial positions where documentation work is essential. " +
"Candidates preparing for such exams must practice regularly to improve both speed and accuracy. " +
"Consistency is the key to mastering typing skills, as daily practice builds muscle memory and reduces errors over time. " +
"Time management during typing tests is equally important because candidates need to maintain a balance between speed and accuracy. " +
"Making too many mistakes can reduce the overall score even if the typing speed is high. " +
"Therefore, candidates should focus on typing carefully while maintaining a steady pace. " +
"Regular mock tests help candidates understand their performance level and identify weak areas that need improvement. " +
"Practicing long passages prepares candidates for real exam scenarios and improves concentration. " +
"Candidates should avoid unnecessary pressure and stay calm during the test to perform better. " +
"Developing good typing habits such as proper finger placement and posture also contributes to better performance. " +
"In conclusion, success in typing tests depends on consistent practice, accuracy, and effective time management.";
}

// 🔥 100 TESTS
let tests = [];
for(let i=1;i<=100;i++){
    tests.push(generatePassage(i));
}

// dropdown
let select = document.getElementById("testSelect");
for(let i=0;i<tests.length;i++){
    let opt = document.createElement("option");
    opt.value = i;
    opt.text = "Test " + (i+1);
    select.appendChild(opt);
}

let time = 600;
let timer;
let currentText = "";

// START
function startTest(){

    let index = document.getElementById("testSelect").value;

    currentText = tests[index];

    document.getElementById("text").innerText = currentText;
    document.getElementById("input").value = "";

    time = 600;

    clearInterval(timer);

    timer = setInterval(()=>{
        time--;

        let m = Math.floor(time/60);
        let s = time%60;

        document.getElementById("timer").innerText =
        "Time Left: "+m+":"+(s<10?"0"+s:s);

        if(time<=0){
            clearInterval(timer);
            endTest();
        }

    },1000);
}

// ✅ CORRECT MISTAKE LOGIC
function endTest(){

    clearInterval(timer);

    let original = currentText.trim().split(/\s+/);
    let typed = document.getElementById("input").value.trim().split(/\s+/);

    let correct = 0;
    let mistakes = 0;

    let length = Math.max(original.length, typed.length);

    for(let i=0;i<length;i++){
        if(typed[i] === original[i]){
            correct++;
        }else{
            mistakes++;
        }
    }

    let attempted = typed.length;

    let minutes = (600-time)/60;

    let gross = attempted / minutes;

    // 🔥 DELHI POLICE STYLE
    let net = gross - mistakes;
    if(net < 0) net = 0;

    let accuracy = (correct/attempted)*100 || 0;

    document.getElementById("result").innerHTML = `
    Attempted Words: ${attempted} <br>
    Gross Speed: ${gross.toFixed(2)} WPM <br>
    Net Speed: ${net.toFixed(2)} WPM <br>
    Accuracy: ${accuracy.toFixed(2)}% <br>
    Mistakes: ${mistakes} <br>
    Result: ${net >= 30 ? "Qualified" : "Not Qualified"}
    `;
}

</script>

</body>
</html>
