<!DOCTYPE html>
<html>
<head>
<title>Delhi Police Typing Test Series</title>

<style>
body{
    font-family: Arial;
    text-align:center;
}

#timer{
    position:fixed;
    right:20px;
    top:20px;
    font-size:20px;
    font-weight:bold;
}

#text{
    border:1px solid black;
    padding:15px;
    height:300px;
    width:80%;
    margin:60px auto 10px;
    overflow-y:auto;
    text-align:left;
    font-size:18px;
    line-height:28px;
}

textarea{
    width:80%;
    height:150px;
    font-size:18px;
}

select, button{
    padding:10px;
    margin:10px;
}
</style>
</head>

<body>

<h2>Delhi Police Head Constable Typing Test Series</h2>

<p id="timer">Time Left: 10:00</p>

<select id="testSelect"></select>

<div id="text">Select Test & Click Start</div>

<textarea id="input" placeholder="Start typing here..."></textarea>

<br>
<button onclick="startTest()">Start</button>
<button onclick="endTest()">Submit</button>

<h3 id="result"></h3>

<script>

// 🔥 100 DIFFERENT PASSAGES
let tests = [];

for(let i=1;i<=100;i++){
    tests.push(
    "Passage "+i+": India is witnessing rapid development in infrastructure, technology, and governance. "+
    "Public services are improving due to digital transformation and policy reforms. "+
    "Citizens are becoming more aware of their rights and responsibilities. "+
    "Efficient administration and skilled workforce are essential for national progress."
    );
}

// 🔥 dropdown fill
let select = document.getElementById("testSelect");
for(let i=0;i<tests.length;i++){
    let option = document.createElement("option");
    option.value = i;
    option.text = "Test " + (i+1);
    select.appendChild(option);
}

let time = 600;
let timer;
let currentText = "";

// START
function startTest(){

    let index = document.getElementById("testSelect").value;

    currentText = tests[index];

    document.getElementById("text").innerText = currentText;

    document.getElementById("input").value = "";

    time = 600;

    clearInterval(timer);

    timer = setInterval(()=>{
        time--;

        let m = Math.floor(time/60);
        let s = time%60;

        document.getElementById("timer").innerText =
        "Time Left: "+m+":"+(s<10?"0"+s:s);

        if(time<=0){
            clearInterval(timer);
            endTest();
        }

    },1000);
}

// RESULT
function endTest(){

    clearInterval(timer);

    let original = currentText.trim().split(/\s+/);
    let typed = document.getElementById("input").value.trim().split(/\s+/);

    let correct = 0;
    let mistakes = 0;

    let maxLength = Math.max(original.length, typed.length);

    for(let i=0;i<maxLength;i++){
        if(typed[i] === original[i]){
            correct++;
        }else{
            mistakes++;
        }
    }

    let attempted = typed.length;

    let minutes = (600-time)/60;

    let gross = attempted / minutes;

    let net = gross - mistakes;
    if(net < 0) net = 0;

    let accuracy = (correct/attempted)*100 || 0;

    document.getElementById("result").innerHTML = `
    Attempted Words: ${attempted} <br>
    Gross Speed: ${gross.toFixed(2)} WPM <br>
    Net Speed: ${net.toFixed(2)} WPM <br>
    Accuracy: ${accuracy.toFixed(2)}% <br>
    Mistakes: ${mistakes} <br>
    Result: ${net >= 30 ? "Qualified" : "Not Qualified"}
    `;
}

</script>

</body>
</html>
