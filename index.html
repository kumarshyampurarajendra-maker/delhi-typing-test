<!DOCTYPE html>
<html>
<head>
<title>Delhi Police Typing Test</title>

<style>
body{
    font-family: Arial;
    text-align:center;
}

#timer{
    position:fixed;
    right:20px;
    top:20px;
    font-size:20px;
    font-weight:bold;
}

#text{
    border:1px solid black;
    padding:15px;
    height:300px;
    width:80%;
    margin:60px auto 10px;
    overflow-y:auto;
    text-align:left;
    font-size:18px;
    line-height:28px;
}

textarea{
    width:80%;
    height:150px;
    font-size:18px;
}

button{
    padding:10px 20px;
    margin:10px;
}
</style>

</head>

<body>

<h2>Delhi Police Head Constable Typing Test</h2>

<p id="timer">Time Left: 10:00</p>

<div id="text">Click Start Test</div>

<textarea id="input" placeholder="Start typing here..."></textarea>

<br>
<button onclick="startTest()">Start Test</button>
<button onclick="endTest()">Submit</button>

<h3 id="result"></h3>

<script>

// 🔥 100 DIFFERENT PASSAGES (AUTO UNIQUE)
let tests = [];

for(let i=1;i<=100;i++){
    tests.push(
    "Passage "+i+": Delhi Police typing test is designed to evaluate typing speed and accuracy of candidates. "+
    "Candidates must type carefully without making mistakes. Regular practice helps in improving performance. "+
    "Typing skill is essential for government jobs and office work. Candidates should maintain focus and avoid errors while typing. "+
    "Accuracy plays an important role because mistakes reduce final speed and score. Practice daily for best results."
    );
}

let time = 600;
let timer;
let currentText = "";

// 🔥 START TEST
function startTest(){

    let index = Math.floor(Math.random()*tests.length);

    let baseText = tests[index];

    // बड़ा passage (scroll आएगा)
    let longText = "";
    for(let i=0;i<8;i++){
        longText += baseText + " ";
    }

    currentText = longText;

    document.getElementById("text").innerText = currentText;

    document.getElementById("input").value = "";

    time = 600;

    clearInterval(timer);

    timer = setInterval(()=>{
        time--;

        let m = Math.floor(time/60);
        let s = time%60;

        document.getElementById("timer").innerText =
        "Time Left: "+m+":"+(s<10?"0"+s:s);

        if(time<=0){
            clearInterval(timer);
            endTest();
        }

    },1000);
}

// 🔥 END TEST
function endTest(){

    clearInterval(timer);

    let original = currentText.trim().split(/\s+/);
    let typed = document.getElementById("input").value.trim().split(/\s+/);

    let correct = 0;
    let mistakes = 0;
    let miniMistakes = 0;

    let maxLength = Math.max(original.length, typed.length);

    for(let i=0;i<maxLength;i++){

        if(typed[i] === original[i]){
            correct++;
        }
        else{
            mistakes++;

            // 🔥 MINI MISTAKE (spelling close check)
            if(typed[i] && original[i]){
                let diff = Math.abs(typed[i].length - original[i].length);
                if(diff <= 2){
                    miniMistakes++;
                }
            }
        }
    }

    let attempted = typed.length;

    let minutes = (600-time)/60;

    let gross = attempted / minutes;

    // 🔥 DELHI POLICE LOGIC
    let net = gross - mistakes;

    if(net < 0) net = 0;

    let accuracy = (correct/attempted)*100 || 0;

    document.getElementById("result").innerHTML = `
    Attempted Words: ${attempted} <br>
    Gross Speed: ${gross.toFixed(2)} WPM <br>
    Net Speed: ${net.toFixed(2)} WPM <br>
    Accuracy: ${accuracy.toFixed(2)}% <br>
    Total Mistakes: ${mistakes} <br>
    Mini Mistakes: ${miniMistakes} <br>
    Result: ${net >= 30 ? "Qualified" : "Not Qualified"}
    `;
}

</script>

</body>
</html>
